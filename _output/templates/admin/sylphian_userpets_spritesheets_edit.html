<xf:title>{{ phrase_dynamic('sylphian_userpets_edit_spritesheet_title', {'filename': $entity.filename}) }}</xf:title>

<xf:form action="{{ link('sylphian_userpets/spritesheets/save') }}" ajax="true" class="block" enctype="multipart/form-data">
    <div class="block-container">
        <div class="block-body">
            <xf:hiddenval name="spritesheet_id" value="{{ $entity.spritesheet_id ?: 0 }}" />
            <xf:hiddenval name="file" value="{$entity.filename}" />

            <xf:uploadrow name="image"
                          label="{{ phrase('sylphian_userpets_replace_image_optional') }}"
                          accept=".png,.gif,.jpg,.jpeg,.webp"
                          explain="{{ phrase('sylphian_userpets_replace_image_explain') }}" />

            <xf:textboxrow name="filename" value="{$entity.filename}" label="{{ phrase('sylphian_userpets_filename_label') }}" explain="{{ phrase('sylphian_userpets_filename_explain') }}" />

            <xf:textboxrow name="title" value="{$entity.title}" label="{{ phrase('sylphian_userpets_title_label') }}" />

            <xf:numberboxrow name="frame_width" value="{$entity.frame_width}" min="1" step="1" label="{{ phrase('sylphian_userpets_frame_width_label') }}" />
            <xf:numberboxrow name="frame_height" value="{$entity.frame_height}" min="1" step="1" label="{{ phrase('sylphian_userpets_frame_height_label') }}" />
            <xf:numberboxrow name="frames_per_animation" value="{$entity.frames_per_animation}" min="1" step="1" label="{{ phrase('sylphian_userpets_frames_per_animation_label') }}" />
            <xf:numberboxrow name="fps" value="{$entity.fps}" min="1" max="120" step="1" label="{{ phrase('sylphian_userpets_fps_label') }}" />
        </div>

        <xf:submitrow submit="{{ phrase('save') }}" icon="save" sticky="true" />
    </div>
</xf:form>
